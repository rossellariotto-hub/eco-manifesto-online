<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Manifesto - IA Lab NextGen</title>
    
    <!-- Librerie esterne via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            scroll-behavior: smooth;
        }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Nascondi scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Componenti Icone SVG (Sostituiscono Lucide per stabilità totale)
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const Recycle = (props) => (
            <Icon {...props}><path d="M7 11V7l-5 5 5 5v-4h3a7 7 0 0 1 7 7h2a9 9 0 0 0-9-9H7Z"/><path d="M17 13v4l5-5-5-5v4h-3a7 7 0 0 1-7-7H5a9 9 0 0 0 9 9h3Z"/></Icon>
        );
        const Leaf = (props) => (
            <Icon {...props}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 1 9.2a7 7 0 0 1-9 8.8Z"/><path d="M11 20v-5"/><path d="M9.29 14.35 5 17"/><path d="m15 11 3-2"/></Icon>
        );
        const Users = (props) => (
            <Icon {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>
        );
        const Palette = (props) => (
            <Icon {...props}><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.92 0 1.7-.39 2.3-1.03a4 4 0 0 1 6.51-1.39A10 10 0 1 0 12 2z"/></Icon>
        );
        const Layout = (props) => (
            <Icon {...props}><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></Icon>
        );
        const Library = (props) => (
            <Icon {...props}><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></Icon>
        );
        const Monitor = (props) => (
            <Icon {...props}><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></Icon>
        );
        const Smartphone = (props) => (
            <Icon {...props}><rect width="14" height="20" x="5" y="2" rx="2"/><path d="M12 18h.01"/></Icon>
        );
        const Sparkles = (props) => (
            <Icon {...props}><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/><path d="M21 17v4"/><path d="M19 19h4"/></Icon>
        );
        const Zap = (props) => (
            <Icon {...props}><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8Z"/></Icon>
        );
        const Download = (props) => (
            <Icon {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></Icon>
        );
        const RotateCcw = (props) => (
            <Icon {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>
        );
        const Pencil = (props) => (
            <Icon {...props}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></Icon>
        );
        const Settings2 = (props) => (
            <Icon {...props}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></Icon>
        );
        const ImageIcon = (props) => (
            <Icon {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Icon>
        );
        const Compass = (props) => (
            <Icon {...props}><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></Icon>
        );
        const CheckCircle2 = (props) => (
            <Icon {...props}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></Icon>
        );
        const ArrowRight = (props) => (
            <Icon {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>
        );
        const Trash2 = (props) => (
            <Icon {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>
        );
        const AlertTriangle = (props) => (
            <Icon {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></Icon>
        );
        const Target = (props) => (
            <Icon {...props}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Icon>
        );

        // Configurazione App
        const apiKey = ''; // Inserire qui la propria chiave API
        const ITEM_WEIGHT = 20;

        const CATEGORIES = {
            obiettivo: {
                label: '1. OBIETTIVO AMBIENTALE',
                icon: <Leaf className="text-emerald-500" size={18} />,
                options: ['Oceani Liberi dalla Plastica', 'Giustizia Climatica', 'Rifiuti Zero', 'Riforestazione Urbana']
            },
            inclusione: {
                label: '2. VALORE SOCIALE',
                icon: <Users className="text-indigo-500" size={18} />,
                options: ['Diversità Umana', 'Equità Generazionale', 'Accessibilità per Tutti', 'Cooperazione Globale']
            },
            metodo: {
                label: '3. METODOLOGIA',
                icon: <Recycle className="text-blue-500" size={18} />,
                options: ['Economia Circolare', 'Upcycling Solidale', 'Riciclo Comunitario', 'Innovazione Trasparente']
            },
            stile: {
                label: '4. STILE VISIVO',
                icon: <Palette className="text-rose-500" size={18} />,
                options: ['Realismo Inclusivo', 'Illustrazione Educativa', 'Pop-Art Sostenibile', 'Futurismo Verde']
            }
        };

        function App() {
            const [activeTab, setActiveTab] = React.useState('creazione');
            const [title, setTitle] = React.useState('');
            const [format, setFormat] = React.useState('orizzontale');
            const [selections, setSelections] = React.useState({ obiettivo: null, inclusione: null, metodo: null, stile: null });
            const [dynamicPrompt, setDynamicPrompt] = React.useState("");
            const [isManualMode, setIsManualMode] = React.useState(false);
            const [isGenerating, setIsGenerating] = React.useState(false);
            const [generatedManifesto, setGeneratedManifesto] = React.useState(null);
            const [gallery, setGallery] = React.useState([]);
            const [error, setError] = React.useState(null);

            // Sincronizzazione Prompt Dinamico
            React.useEffect(() => {
                if (!isManualMode) {
                    const formatText = format === 'orizzontale' ? "orizzontale (16:9)" : "verticale (3:4)";
                    const prompt = `Un manifesto ${formatText} professionale. L'UNICO TESTO presente è lo slogan in italiano: "${title.toUpperCase()}". La scena illustra visivamente ${selections.obiettivo || '[Obiettivo]'} tramite ${selections.metodo || '[Metodo]'}, con persone diverse (${selections.inclusione || '[Valore]'}). Stile: ${selections.stile || 'Moderno'}. Colori vivaci e naturali. Nessun altro testo ammesso.`;
                    setDynamicPrompt(prompt);
                }
            }, [title, selections, format, isManualMode]);

            const power = Object.values(selections).filter(v => v).length * 20 + (title.trim().length >= 3 ? 20 : 0);

            const generate = async () => {
                setIsGenerating(true);
                setError(null);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            instances: { prompt: dynamicPrompt },
                            parameters: { sampleCount: 1 }
                        })
                    });
                    const result = await response.json();
                    if (!result.predictions || result.predictions.length === 0) throw new Error("Errore API");
                    const base64 = result.predictions[0].bytesBase64Encoded;
                    const url = `data:image/png;base64,${base64}`;
                    const item = { id: Date.now(), title, imageUrl: url, format, date: new Date().toLocaleDateString('it-IT'), tag: selections.obiettivo };
                    setGeneratedManifesto(item);
                    setGallery(prev => [item, ...prev]);
                    
                    setTimeout(() => {
                        document.getElementById('risultato-area')?.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                } catch (e) {
                    setError("Errore nella generazione. Controlla la tua API Key.");
                } finally {
                    setIsGenerating(false);
                }
            };

            const download = (url, fileName) => {
                const link = document.createElement('a');
                link.href = url;
                link.download = `${fileName.replace(/\s+/g, '_')}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const reset = () => {
                setTitle('');
                setSelections({ obiettivo: null, inclusione: null, metodo: null, stile: null });
                setGeneratedManifesto(null);
                setError(null);
                setIsManualMode(false);
            };

            const handleSelect = (key, opt) => {
                setSelections(prev => ({ ...prev, [key]: opt }));
            };

            const handleDeleteFromGallery = (id) => {
                setGallery(prev => prev.filter(item => item.id !== id));
            };

            return (
                <div className="min-h-screen flex flex-col text-slate-900 bg-slate-50">
                    {/* Header Istituzionale */}
                    <header className="bg-white border-b border-slate-200 p-6 flex flex-col md:flex-row justify-between items-center sticky top-0 z-50 shadow-sm gap-4">
                        <div className="flex items-center gap-4 text-left">
                            <div className="bg-gradient-to-br from-indigo-600 to-emerald-500 p-3 rounded-2xl text-white shadow-lg rotate-[-2deg]">
                                <Recycle size={28}/>
                            </div>
                            <div>
                                <h1 className="font-black text-2xl uppercase tracking-tighter leading-none">ECO <span className="text-emerald-600">MANIFESTO</span></h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Scheda Mentalità — <span className="text-indigo-600">IA_LAB NextGen Junior</span></p>
                            </div>
                        </div>
                        <nav className="flex gap-2 bg-slate-100 p-1 rounded-2xl border border-slate-200">
                            <button onClick={() => setActiveTab('creazione')} className={`px-8 py-2.5 rounded-xl text-xs font-black transition-all ${activeTab === 'creazione' ? 'bg-white shadow-md text-indigo-600 border border-slate-100' : 'text-slate-500'}`}>CREAZIONE</button>
                            <button onClick={() => setActiveTab('archivio')} className={`px-8 py-2.5 rounded-xl text-xs font-black transition-all ${activeTab === 'archivio' ? 'bg-white shadow-md text-indigo-600 border border-slate-100' : 'text-slate-500'}`}>ARCHIVIO ({gallery.length})</button>
                        </nav>
                    </header>

                    {activeTab === 'creazione' ? (
                        <main className="max-w-7xl mx-auto w-full p-6 md:p-10 space-y-16 animate-in">
                            {/* FASE 1: MESSAGGIO */}
                            <section className="space-y-6">
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 rounded-2xl bg-indigo-600 text-white flex items-center justify-center shadow-lg font-black text-sm italic">1</div>
                                    <h2 className="text-sm font-black uppercase tracking-[0.2em] text-indigo-600">Fase 1: Il Messaggio</h2>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 text-left">
                                    <div className="lg:col-span-2 bg-white p-10 rounded-[48px] border-2 border-indigo-100 shadow-sm flex flex-col justify-center">
                                        <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4 block">Slogan del Manifesto</label>
                                        <input value={title} onChange={e => setTitle(e.target.value)} className="w-full text-4xl md:text-5xl font-black text-slate-900 border-none focus:ring-0 p-0 placeholder:text-slate-100 bg-transparent tracking-tighter" placeholder="Inserisci lo slogan..." />
                                        <p className="mt-6 text-[10px] font-bold text-indigo-500 uppercase flex items-center gap-2 tracking-wider"><Sparkles size={14}/> Sarà l'unico testo presente nell'immagine</p>
                                    </div>
                                    <div className="bg-white p-10 rounded-[48px] border-2 border-slate-200 flex flex-col items-center justify-center shadow-sm relative overflow-hidden group">
                                        <div className="absolute inset-0 bg-gradient-to-tr from-indigo-50 to-emerald-50 opacity-50"></div>
                                        <span className="text-[10px] font-black text-slate-400 uppercase mb-2 relative z-10">Potenza Messaggio</span>
                                        <span className={`text-7xl font-black transition-all relative z-10 ${power === 100 ? 'text-emerald-500 scale-110' : 'text-slate-200'}`}>{power}%</span>
                                        <div className="w-full h-3 bg-slate-100 rounded-full mt-6 overflow-hidden relative z-10 border border-white">
                                            <div className={`h-full transition-all duration-1000 ${power === 100 ? 'bg-gradient-to-r from-emerald-500 to-indigo-600 shadow-[0_0_15px_rgba(16,185,129,0.3)]' : 'bg-indigo-400'}`} style={{width: `${power}%`}}></div>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* FASE 2: PARAMETRI E FORMATO */}
                            <section className="space-y-6">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 rounded-2xl bg-emerald-600 text-white flex items-center justify-center shadow-lg font-black text-sm italic">2</div>
                                        <h2 className="text-sm font-black uppercase tracking-[0.2em] text-emerald-600">Fase 2: La Configurazione</h2>
                                    </div>
                                    <div className="flex bg-white p-1 rounded-2xl border-2 border-emerald-100 shadow-sm self-start md:self-auto">
                                        <button onClick={() => setFormat('orizzontale')} className={`flex items-center gap-2 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${format === 'orizzontale' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-400 hover:text-emerald-600'}`}><Monitor size={14}/> Orizzontale</button>
                                        <button onClick={() => setFormat('verticale')} className={`flex items-center gap-2 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${format === 'verticale' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-400 hover:text-emerald-600'}`}><Smartphone size={14}/> Verticale</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-left">
                                    {Object.entries(CATEGORIES).map(([key, cat]) => (
                                        <div key={key} className="bg-white p-7 rounded-[40px] border-2 border-slate-100 hover:border-emerald-200 transition-all shadow-sm group">
                                            <div className="flex items-center gap-3 mb-6 transition-transform group-hover:translate-x-1">
                                                <div className="p-2.5 bg-slate-50 rounded-xl">{cat.icon}</div>
                                                <h3 className="text-[11px] font-black text-slate-800 uppercase tracking-tight">{cat.label}</h3>
                                            </div>
                                            <div className="space-y-2.5">
                                                {cat.options.map(opt => (
                                                    <button key={opt} onClick={() => handleSelect(key, opt)} className={`w-full text-left px-5 py-4 rounded-2xl text-[11px] font-bold border-2 transition-all ${selections[key] === opt ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-slate-50 border-transparent text-slate-400 hover:bg-white hover:border-emerald-100'}`}>
                                                        {opt}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* FASE 3: GENERAZIONE */}
                            <section id="risultato-area" className="space-y-6 py-4">
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 rounded-2xl bg-slate-800 text-white flex items-center justify-center shadow-lg font-black text-sm italic">3</div>
                                    <h2 className="text-sm font-black uppercase tracking-[0.2em] text-slate-600">Fase 3: Sintesi Creativa</h2>
                                </div>
                                
                                <div className="bg-[#0F172A] p-8 md:p-14 rounded-[64px] border-4 border-slate-800 shadow-2xl relative overflow-hidden transition-all duration-700">
                                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-16 items-start">
                                        
                                        {/* Anteprima Manifesto */}
                                        <div className="lg:col-span-12 xl:col-span-6 space-y-8 text-left">
                                            <div className="flex items-center gap-4 text-white">
                                                <div className="p-2 bg-emerald-500/10 rounded-lg text-emerald-400"><ImageIcon size={24}/></div>
                                                <h2 className="text-2xl font-black uppercase tracking-tighter italic text-left">Il Manifesto</h2>
                                            </div>
                                            <div className={`mx-auto bg-slate-900 rounded-[56px] overflow-hidden flex items-center justify-center border-[16px] border-slate-800 shadow-2xl transition-all duration-500 ${format === 'orizzontale' ? 'aspect-video w-full' : 'aspect-[3/4] w-2/3 shadow-emerald-500/5'}`}>
                                                {isGenerating ? (
                                                    <div className="flex flex-col items-center gap-6 animate-pulse">
                                                        <div className="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin" />
                                                        <p className="text-emerald-400 font-black uppercase tracking-[0.2em] text-[10px] italic">Generazione artistica...</p>
                                                    </div>
                                                ) : generatedManifesto ? (
                                                    <img src={generatedManifesto.imageUrl} className="w-full h-full object-cover animate-in" alt="Eco Manifesto" />
                                                ) : (
                                                    <div className="flex flex-col items-center gap-6 opacity-20 text-white group text-center">
                                                        <Compass size={80} className="group-hover:rotate-45 transition-transform duration-1000"/>
                                                        <p className="text-[10px] font-black uppercase tracking-[0.3em]">Attesa Configurazione</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {/* Dashboard Prompt */}
                                        <div className="lg:col-span-12 xl:col-span-6 space-y-10 flex flex-col h-full text-left">
                                            <div className="bg-slate-900/50 rounded-[48px] p-8 md:p-10 border-2 border-slate-800 flex flex-col flex-1 shadow-inner relative transition-all hover:border-slate-700">
                                                <div className="flex justify-between items-center mb-8">
                                                    <div className="flex items-center gap-3 text-emerald-400">
                                                        <Settings2 size={20}/><span className="text-[11px] font-black uppercase tracking-widest text-left">Prompt Dinamico</span>
                                                    </div>
                                                    <button onClick={() => setIsManualMode(!isManualMode)} className={`px-6 py-2.5 rounded-2xl text-[10px] font-black border-2 transition-all ${isManualMode ? 'bg-emerald-500 border-emerald-500 text-slate-900' : 'text-slate-500 border-slate-800 hover:border-slate-600'}`}>MODALITÀ MANUALE</button>
                                                </div>
                                                <textarea value={dynamicPrompt} onChange={e => setDynamicPrompt(e.target.value)} disabled={!isManualMode} className="w-full bg-slate-950/50 p-8 rounded-[32px] text-slate-300 text-sm outline-none resize-none flex-1 font-medium leading-relaxed border-2 border-transparent focus:border-emerald-500/30 transition-all no-scrollbar text-left" placeholder="I parametri appariranno qui..." />
                                                <div className="mt-6 flex items-center gap-4 text-[10px] font-bold text-slate-500 uppercase italic">
                                                    <Pencil size={14} className="text-emerald-500/50"/>
                                                    {isManualMode ? "Puoi modificare il testo liberamente." : "Il comando si aggiorna in base alle tue scelte."}
                                                </div>
                                            </div>

                                            {/* Azioni */}
                                            <div className="w-full">
                                                {!generatedManifesto ? (
                                                    <button onClick={generate} disabled={power < 100 || isGenerating} className="w-full py-10 bg-emerald-500 text-slate-900 rounded-[48px] font-black uppercase tracking-[0.4em] hover:bg-emerald-400 transition-all disabled:opacity-10 disabled:grayscale shadow-xl shadow-emerald-900/20 active:scale-95 flex items-center justify-center gap-4">
                                                        {isGenerating ? 'SINTESI IA...' : 'GENERA MANIFESTO'}
                                                        <Zap size={24} className={power === 100 ? "fill-slate-900 animate-pulse" : ""}/>
                                                    </button>
                                                ) : (
                                                    <div className="grid grid-cols-1 sm:grid-cols-5 gap-6 animate-in">
                                                        <button onClick={() => download(generatedManifesto.imageUrl, generatedManifesto.title)} className="sm:col-span-4 bg-white text-slate-900 py-10 rounded-[48px] font-black text-sm uppercase tracking-widest hover:bg-slate-100 transition-all shadow-xl flex items-center justify-center gap-4">
                                                            <Download size={24}/> SCARICA PNG
                                                        </button>
                                                        <button onClick={reset} className="bg-slate-800 text-emerald-400 rounded-[40px] border-2 border-slate-700 flex items-center justify-center hover:bg-slate-700 transition-all py-8 sm:py-0 shadow-md">
                                                            <RotateCcw size={32}/>
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                    {error && <div className="mt-10 bg-rose-900/20 text-rose-400 p-8 rounded-[32px] border-2 border-rose-900/50 flex items-center gap-5 text-left"><AlertTriangle size={24}/><span className="text-xs font-black uppercase tracking-widest">{error}</span></div>}
                                </div>
                            </section>
                        </main>
                    ) : (
                        /* ARCHIVIO */
                        <main className="max-w-7xl mx-auto w-full p-6 md:p-10 space-y-12 animate-in text-left">
                            <div className="flex flex-col md:flex-row items-end justify-between gap-10 border-b-2 border-slate-200 pb-12">
                                <div className="space-y-4">
                                    <div className="flex items-center gap-6"><Library size={56} className="text-indigo-600 text-left"/><h2 className="text-5xl font-black italic uppercase tracking-tighter text-left">Archivio Visioni</h2></div>
                                    <p className="text-sm text-slate-500 font-medium max-w-xl italic leading-relaxed text-left">Le tue creazioni per un futuro sostenibile salvate nel laboratorio.</p>
                                </div>
                                <div className="bg-white border-2 border-slate-200 px-12 py-10 rounded-[56px] flex items-center gap-12 shadow-sm">
                                    <div className="text-center"><p className="text-5xl font-black text-slate-900 leading-none">{gallery.length}</p><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2 text-center">Manifesti</p></div>
                                    <button onClick={() => setActiveTab('creazione')} className="bg-indigo-600 text-white px-12 py-6 rounded-3xl font-black text-[12px] uppercase tracking-widest hover:bg-indigo-700 transition-all flex items-center gap-4 shadow-lg">NUOVA CREAZIONE <ArrowRight size={20}/></button>
                                </div>
                            </div>

                            {gallery.length === 0 ? (
                                <div className="py-40 flex flex-col items-center justify-center opacity-10 text-center">
                                    <ImageIcon size={140}/><p className="text-3xl font-black uppercase tracking-[0.4em] mt-10 italic">Galleria Vuota</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                    {gallery.map(item => (
                                        <div key={item.id} className="bg-white rounded-[64px] overflow-hidden border-2 border-slate-100 group relative transition-all hover:shadow-2xl text-left">
                                            <div className={`relative overflow-hidden bg-slate-50 mx-auto ${item.format === 'orizzontale' ? 'aspect-video w-full' : 'aspect-[3/4] w-2/3 mt-6 rounded-3xl'}`}>
                                                <img src={item.imageUrl} className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" alt="Galleria Manifesto" />
                                                <div className="absolute inset-0 bg-slate-900/95 backdrop-blur-sm flex items-center justify-center p-12 opacity-0 group-hover:opacity-100 transition-all duration-300">
                                                    <div className="flex flex-col gap-4 w-full max-w-xs">
                                                        <button onClick={() => download(item.imageUrl, item.title)} className="w-full bg-white text-slate-900 py-6 rounded-3xl font-black text-[12px] uppercase tracking-widest shadow-xl flex items-center justify-center gap-3 hover:bg-slate-50"><Download size={22}/> PNG</button>
                                                        <button onClick={() => handleDeleteFromGallery(item.id)} className="w-full bg-rose-500/20 text-white py-6 rounded-3xl font-black text-[12px] uppercase tracking-widest border border-white/10 hover:bg-rose-600 transition-colors flex items-center justify-center gap-3"><Trash2 size={22}/> ELIMINA</button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="p-10 text-left">
                                                <h3 className="font-black text-xl uppercase italic text-slate-900 line-clamp-1 mb-2 text-left">{item.title}</h3>
                                                <div className="flex items-center gap-4 text-left">
                                                    <span className="text-[10px] font-black text-slate-400 uppercase italic text-left">{item.date}</span>
                                                    <div className="w-2 h-2 bg-indigo-200 rounded-full" />
                                                    <span className="text-[10px] font-black text-indigo-500 uppercase truncate text-left">{item.tag}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </main>
                    )}

                    {/* Footer */}
                    <footer className="bg-white border-t border-slate-200 py-20 px-10 flex flex-col md:flex-row items-center justify-between gap-10 text-[11px] font-black text-slate-400 uppercase tracking-[0.4em] italic text-left">
                        <div className="flex items-center gap-12 text-left">
                            <span className="text-slate-900 font-black uppercase text-left">Eco Manifesto</span>
                            <span className="opacity-10 text-slate-300 text-2xl font-light">/</span>
                            <span className="text-indigo-600 text-left">Junior IA Lab NextGen</span>
                        </div>
                        <div className="flex items-center gap-12 text-right leading-none">
                            <span className="opacity-60 uppercase text-right">Educazione alla Cittadinanza Digitale</span>
                            <span className="opacity-10 text-slate-300 text-2xl font-light">/</span>
                            <span className="text-right">© 2026 Eco-Manifesto Engine</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
